name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  SOURCE_DATE_EPOCH: "1781481600"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check CLI help
        run: agent-librarian --help

      - name: Regenerate sample catalog
        run: agent-librarian catalog examples/sample-collection --out examples/generated-catalog

      - name: Validate generated catalog
        run: agent-librarian validate examples/generated-catalog

      - name: Check generated catalog is current
        run: git diff --exit-code -- examples/generated-catalog

      - name: Run tests
        run: pytest

      - name: Check whitespace
        run: git diff --check
