name: agent-librarian-local-tools
artifact_status: design-time
runtime_loaded: false
layer: planned-llm-interaction
description: >-
  Bounded deterministic CLI actions that a future LLM interaction layer may
  propose. This is not a general shell or local file-operation interface.
contract_doc: agent/tools/agent-librarian-cli.md
execution_policy:
  approval_required: true
  exact_command_and_scope_required: true
  arbitrary_shell_allowed: false
  approval_must_be_explicit: true
source_of_truth: CLI results and generated output files
tools:
  - name: catalog_collection
    command: agent-librarian catalog SOURCE_DIR --out OUTPUT_DIR
    inputs:
      - SOURCE_DIR
      - OUTPUT_DIR
    optional_arguments:
      - --include GLOB
      - --exclude PATTERNS
      - --strict
    outputs:
      - index.json
      - catalog.md
      - diagnostics.json
      - overlap-report.json
    permissions:
      - read selected supported files under SOURCE_DIR
      - write generated files only under OUTPUT_DIR
    prohibited:
      - execute, edit, delete, merge, or publish source artifacts
      - infer approval or expand scope beyond the proposed command
      - run arbitrary shell commands or unlisted CLI actions
    side_effects:
      - creates or replaces documented generated files under OUTPUT_DIR
    approval_required: true
    safety_note: >-
      Show exact source and output paths, optional arguments, reads, writes,
      generated files, and a privacy reminder before requesting approval.
  - name: validate_catalog
    command: agent-librarian validate CATALOG_DIR
    inputs:
      - CATALOG_DIR
    outputs:
      - schema validation results
    permissions:
      - read documented generated JSON files under CATALOG_DIR
    prohibited:
      - describe structural validation as safety certification
      - rescan source artifacts or claim publication readiness
    side_effects: []
    approval_required: true
    safety_note: >-
      Validation is read-only and reports schema validity only; it does not
      certify safety, privacy, completeness, correctness, or approval.
  - name: report_catalog
    command: agent-librarian report CATALOG_DIR
    inputs:
      - CATALOG_DIR
    outputs:
      - diagnostics, warning, and overlap summary
    permissions:
      - read documented generated files under CATALOG_DIR
    prohibited:
      - make artifact approval, merge, deletion, or publication decisions
      - rescan source artifacts or describe review prompts as decisions
    side_effects: []
    approval_required: true
    safety_note: >-
      Report output is a human-review aid. Warnings and overlap candidates are
      prompts for review, not certification or approval decisions.
runtime_note: >-
  The current CLI implements these commands directly. No LLM runtime currently
  loads this manifest or executes commands from it.
